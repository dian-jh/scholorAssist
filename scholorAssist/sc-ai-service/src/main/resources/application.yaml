server:
  port: 10160

spring:
  application:
    name: sc-ai-service
  profiles:
    active: dev
  config:
    import:
      - nacos:sc-ai.yaml?group=DEFAULT_GROUP
      - nacos:mybatis-plus.yaml?group=DEFAULT_GROUP
      - nacos:pgsql.yaml?group=DEFAULT_GROUP
  #    spring.config.import[1]=nacos:{dataId1}?group={group1}
  cloud:
    nacos:
      config:
        namespace: ede3834d-0b93-4b3b-960d-0f656975cc1d
        server-addr: 127.0.0.1:8848
      #          nacos服务注册
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ede3834d-0b93-4b3b-960d-0f656975cc1d


  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: sk-1c7d4c034c8841d6bad45e70427b36d6
      chat:
        options:
          model: qwen-max-latest
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1536  #向量维度
    chat:
      memory:
        repository:
          jdbc:
            # 告诉 Spring AI 总是执行 schema 初始化
            initialize-schema: always

    vectorstore:
      pgvector:
      index-type: HNSW
      distance-type: COSINE_DISTANCE
      dimensions: 1536
      max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
