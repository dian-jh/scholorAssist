server:
  port: 10170

spring:
  application:
    name: sc-categories-manage
  profiles:
    active: dev
  config:
    import:
      - nacos:sc-categories.yaml?group=DEFAULT_GROUP
      - nacos:mybatis-plus.yaml?group=DEFAULT_GROUP
      - nacos:pgsql.yaml?group=DEFAULT_GROUP
  #    spring.config.import[1]=nacos:{dataId1}?group={group1}
  cloud:
    nacos:
      #    nacos配置中心
      config:
        namespace: ede3834d-0b93-4b3b-960d-0f656975cc1d
        server-addr: 127.0.0.1:8848
#          nacos服务注册
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ede3834d-0b93-4b3b-960d-0f656975cc1d

