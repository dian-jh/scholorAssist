user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    
    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;
        
        # 安全头部
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # SPA路由支持
        location / {
            try_files $uri $uri/ /index.html;
        }
        
        # 健康检查
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # 网关服务：静态PDF/资源由Nginx直接读取并返回
    # 注意：该server监听10100端口，需确保宿主机或容器已开放该端口
    server {
        listen 10180;
        server_name localhost;

        # 静态资源映射：/uploads/** -> /data/uploads/**
        # 将宿主机的上传目录挂载到容器的 /data/uploads 只读路径
        # 例如：-v D:/project/scholorAssist/scholorAssist/uploads:/data/uploads:ro
        # 优先从本地磁盘读取；若文件不存在则回退到后端网关（10100）
        location /uploads/ {
            root /data;  # => /uploads/xxx.pdf 映射为 /data/uploads/xxx.pdf
            try_files $uri $uri/ @backend_uploads;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        }

        # 404时回退到后端微服务（如Spring Boot）
        location @backend_uploads {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            # 在容器内访问宿主机的后端微服务
            proxy_pass http://host.docker.internal:10100;  # 保留原始URI /uploads/...
            proxy_read_timeout 30s;
        }

        # 健康检查（用于网关可用性探测）
        location /health {
            access_log off;
            return 200 "gateway healthy\n";
            add_header Content-Type text/plain;
        }

        # 如需反向代理API，可按需启用并指向后端微服务
        # 示例：将 /api/** 转发到后端服务 http://localhost:10101
        # location /api/ {
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #     proxy_http_version 1.1;
        #     proxy_set_header Connection "";
        #     proxy_pass http://localhost:10101/;
        # }
    }
}