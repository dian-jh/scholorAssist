<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文献辅助阅读系统 - 仪表盘</title>
    <!-- 功能要点：左侧可拖拽的多级类目树，支持增删改操作；中间文献列表，包含搜索、排序、上传功能；右侧快速统计和最近操作记录 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1763EA',
                        'primary-dark': '#1451C7',
                        background: '#F8FAFF'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="flex items-center">
                        <i class="fas fa-book-open text-primary text-xl mr-3"></i>
                        <h1 class="text-xl font-bold text-gray-900">文献辅助阅读系统</h1>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- 搜索框 -->
                    <div class="relative">
                        <input type="text" id="globalSearch" placeholder="搜索文献..."
                               class="w-64 pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>
                    
                    <!-- 用户菜单 -->
                    <div class="relative">
                        <button id="userMenuBtn" class="flex items-center space-x-2 text-gray-700 hover:text-primary">
                            <div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center">
                                <i class="fas fa-user text-white text-sm"></i>
                            </div>
                            <span class="font-medium">用户</span>
                            <i class="fas fa-chevron-down text-sm"></i>
                        </button>
                        
                        <div id="userMenu" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg border border-gray-200 hidden z-50">
                            <a href="profile.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <i class="fas fa-user-cog mr-2"></i>个人设置
                            </a>
                            <a href="notes.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <i class="fas fa-sticky-note mr-2"></i>我的笔记
                            </a>
                            <a href="ai_chat.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
                                <i class="fas fa-robot mr-2"></i>AI对话历史
                            </a>
                            <hr class="my-1">
                            <a href="#" onclick="logout()" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                                <i class="fas fa-sign-out-alt mr-2"></i>退出登录
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <div class="flex h-screen pt-16">
        <!-- 左侧类目树 -->
        <div class="w-80 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-200">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-900">文献分类</h2>
                    <button id="addCategoryBtn" class="text-primary hover:text-primary-dark">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                
                <!-- 类目树 -->
                <div id="categoryTree" class="space-y-1">
                    <!-- 动态加载类目 -->
                </div>
            </div>
        </div>

        <!-- 中间文献列表 -->
        <div class="flex-1 flex flex-col">
            <!-- 工具栏 -->
            <div class="bg-white border-b border-gray-200 p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <h3 class="text-lg font-semibold text-gray-900" id="currentCategoryTitle">全部文献</h3>
                        <span class="text-sm text-gray-500" id="documentCount">0 篇文献</span>
                    </div>
                    
                    <div class="flex items-center space-x-3">
                        <!-- 排序选择 -->
                        <select id="sortSelect" class="border border-gray-300 rounded-md px-3 py-1 text-sm">
                            <option value="upload_date">按上传时间</option>
                            <option value="title">按标题</option>
                            <option value="author">按作者</option>
                            <option value="read_progress">按阅读进度</option>
                        </select>
                        
                        <!-- 视图切换 -->
                        <div class="flex border border-gray-300 rounded-md">
                            <button id="gridViewBtn" class="px-3 py-1 text-sm bg-primary text-white rounded-l-md">
                                <i class="fas fa-th-large"></i>
                            </button>
                            <button id="listViewBtn" class="px-3 py-1 text-sm text-gray-600 hover:bg-gray-50 rounded-r-md">
                                <i class="fas fa-list"></i>
                            </button>
                        </div>
                        
                        <!-- 上传按钮 -->
                        <button id="uploadBtn" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-md text-sm font-medium">
                            <i class="fas fa-upload mr-2"></i>上传文献
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 文献网格视图 -->
            <div class="flex-1 p-6 overflow-y-auto">
                <div id="documentsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- 动态加载文献卡片 -->
                </div>
                
                <!-- 文献列表视图（隐藏） -->
                <div id="documentsList" class="hidden">
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200">
                        <table class="w-full">
                            <thead class="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">文献</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">作者</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">上传时间</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">进度</th>
                                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody id="documentsTableBody" class="bg-white divide-y divide-gray-200">
                                <!-- 动态加载表格行 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧统计面板 -->
        <div class="w-80 bg-white border-l border-gray-200 flex flex-col">
            <div class="p-6">
                <h3 class="text-lg font-semibold text-gray-900 mb-4">统计概览</h3>
                
                <!-- 统计卡片 -->
                <div class="space-y-4 mb-6">
                    <div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-lg p-4 text-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-blue-100 text-sm">总文献数</p>
                                <p class="text-2xl font-bold" id="totalDocuments">0</p>
                            </div>
                            <i class="fas fa-file-pdf text-2xl text-blue-200"></i>
                        </div>
                    </div>
                    
                    <div class="bg-gradient-to-r from-green-500 to-green-600 rounded-lg p-4 text-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-green-100 text-sm">已完成阅读</p>
                                <p class="text-2xl font-bold" id="completedReading">0</p>
                            </div>
                            <i class="fas fa-check-circle text-2xl text-green-200"></i>
                        </div>
                    </div>
                    
                    <div class="bg-gradient-to-r from-purple-500 to-purple-600 rounded-lg p-4 text-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-purple-100 text-sm">AI问答次数</p>
                                <p class="text-2xl font-bold" id="aiQuestions">0</p>
                            </div>
                            <i class="fas fa-robot text-2xl text-purple-200"></i>
                        </div>
                    </div>
                    
                    <div class="bg-gradient-to-r from-orange-500 to-orange-600 rounded-lg p-4 text-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-orange-100 text-sm">笔记数量</p>
                                <p class="text-2xl font-bold" id="totalNotes">0</p>
                            </div>
                            <i class="fas fa-sticky-note text-2xl text-orange-200"></i>
                        </div>
                    </div>
                </div>
                
                <!-- 最近活动 -->
                <div>
                    <h4 class="text-md font-semibold text-gray-900 mb-3">最近活动</h4>
                    <div id="recentActivity" class="space-y-3">
                        <!-- 动态加载最近活动 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 上传文献弹窗 -->
    <div id="uploadModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 w-full max-w-md mx-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-gray-900">上传PDF文献</h3>
                <button id="closeUploadModal" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="uploadArea" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:border-primary transition-colors cursor-pointer">
                <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i>
                <p class="text-gray-600 mb-2">点击或拖拽PDF文件到此处</p>
                <p class="text-sm text-gray-500">支持PDF格式，最大50MB</p>
                <input type="file" id="fileInput" accept=".pdf" class="hidden">
            </div>
            
            <div id="uploadProgress" class="hidden mt-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm text-gray-600">上传进度</span>
                    <span id="progressPercent" class="text-sm text-gray-600">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progressBar" class="bg-primary h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="flex justify-end space-x-3 mt-6">
                <button id="cancelUpload" class="px-4 py-2 text-gray-600 hover:text-gray-800">取消</button>
                <button id="startUpload" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-md disabled:opacity-50" disabled>
                    开始上传
                </button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let categories = [];
        let documents = [];
        let currentView = 'grid';
        let selectedFile = null;

        // 页面加载时初始化
        window.addEventListener('load', function() {
            // 检查登录状态
            if (!localStorage.getItem('isLoggedIn')) {
                window.location.href = 'login.html';
                return;
            }
            
            loadCategories();
            loadDocuments();
            loadStatistics();
            loadRecentActivity();
            initializeEventListeners();
        });

        // 加载类目数据
        async function loadCategories() {
            try {
                const response = await fetch('../data/mock_categories.json');
                categories = await response.json();
                renderCategoryTree();
            } catch (error) {
                console.error('加载类目失败:', error);
            }
        }

        // 渲染类目树
        function renderCategoryTree() {
            const treeContainer = document.getElementById('categoryTree');
            treeContainer.innerHTML = '';
            
            // 添加"全部文献"选项
            const allItem = createCategoryItem({
                id: 'all',
                name: '全部文献',
                document_count: documents.length
            }, 0);
            allItem.classList.add('bg-primary', 'text-white');
            treeContainer.appendChild(allItem);
            
            // 渲染类目树
            categories.forEach(category => {
                treeContainer.appendChild(createCategoryItem(category, 0));
            });
        }

        // 创建类目项
        function createCategoryItem(category, level) {
            const item = document.createElement('div');
            item.className = `flex items-center justify-between p-2 rounded-md hover:bg-gray-100 cursor-pointer category-item`;
            item.dataset.categoryId = category.id;
            item.style.paddingLeft = `${level * 20 + 8}px`;
            
            item.innerHTML = `
                <div class="flex items-center space-x-2">
                    ${category.children && category.children.length > 0 ? 
                        '<i class="fas fa-chevron-right text-xs text-gray-400 category-toggle"></i>' : 
                        '<i class="fas fa-folder text-sm text-gray-400"></i>'
                    }
                    <span class="text-sm font-medium">${category.name}</span>
                    <span class="text-xs text-gray-500">(${category.document_count})</span>
                </div>
                <div class="flex items-center space-x-1">
                    <button class="text-gray-400 hover:text-primary text-xs" onclick="editCategory('${category.id}')">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="text-gray-400 hover:text-red-500 text-xs" onclick="deleteCategory('${category.id}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            
            // 添加点击事件
            item.addEventListener('click', (e) => {
                if (!e.target.closest('button')) {
                    selectCategory(category.id);
                }
            });
            
            return item;
        }

        // 加载文献数据
        async function loadDocuments() {
            try {
                const response = await fetch('../data/mock_documents.json');
                documents = await response.json();
                renderDocuments();
                updateDocumentCount();
            } catch (error) {
                console.error('加载文献失败:', error);
            }
        }

        // 渲染文献
        function renderDocuments(filteredDocs = documents) {
            if (currentView === 'grid') {
                renderDocumentsGrid(filteredDocs);
            } else {
                renderDocumentsList(filteredDocs);
            }
        }

        // 渲染文献网格
        function renderDocumentsGrid(docs) {
            const container = document.getElementById('documentsGrid');
            container.innerHTML = '';
            
            docs.forEach(doc => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow cursor-pointer';
                card.onclick = () => openDocument(doc.id);
                
                card.innerHTML = `
                    <div class="relative">
                        <img src="${doc.thumbnail}" alt="${doc.title}" class="w-full h-48 object-cover rounded-t-lg">
                        <div class="absolute top-2 right-2">
                            <span class="px-2 py-1 text-xs rounded-full ${doc.status === 'ready' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                                ${doc.status === 'ready' ? '已解析' : '解析中'}
                            </span>
                        </div>
                        ${doc.read_progress > 0 ? `
                            <div class="absolute bottom-0 left-0 right-0 bg-black bg-opacity-50 text-white text-xs p-2 rounded-b-lg">
                                阅读进度: ${Math.round(doc.read_progress * 100)}%
                            </div>
                        ` : ''}
                    </div>
                    <div class="p-4">
                        <h4 class="font-semibold text-gray-900 mb-2 line-clamp-2">${doc.title}</h4>
                        <p class="text-sm text-gray-600 mb-2">${doc.author}</p>
                        <p class="text-xs text-gray-500 mb-3 line-clamp-2">${doc.abstract}</p>
                        <div class="flex items-center justify-between text-xs text-gray-500">
                            <span>${doc.pages} 页</span>
                            <span>${doc.file_size}</span>
                        </div>
                        <div class="flex flex-wrap gap-1 mt-2">
                            ${doc.tags.map(tag => `<span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }

        // 打开文档
        function openDocument(docId) {
            window.location.href = `reader.html?doc=${docId}`;
        }

        // 加载统计数据
        function loadStatistics() {
            document.getElementById('totalDocuments').textContent = documents.length;
            document.getElementById('completedReading').textContent = documents.filter(doc => doc.read_progress >= 0.9).length;
            document.getElementById('aiQuestions').textContent = '23'; // Mock数据
            document.getElementById('totalNotes').textContent = '15'; // Mock数据
        }

        // 加载最近活动
        function loadRecentActivity() {
            const activities = [
                { type: 'upload', text: '上传了《Attention Is All You Need》', time: '2小时前' },
                { type: 'note', text: '在《BERT论文》中添加了笔记', time: '4小时前' },
                { type: 'ai', text: '向AI提问关于Transformer架构', time: '6小时前' },
                { type: 'read', text: '完成阅读《ResNet论文》', time: '1天前' }
            ];
            
            const container = document.getElementById('recentActivity');
            container.innerHTML = activities.map(activity => `
                <div class="flex items-start space-x-3 p-3 bg-gray-50 rounded-lg">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary flex items-center justify-center">
                        <i class="fas ${getActivityIcon(activity.type)} text-white text-xs"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm text-gray-900">${activity.text}</p>
                        <p class="text-xs text-gray-500">${activity.time}</p>
                    </div>
                </div>
            `).join('');
        }

        function getActivityIcon(type) {
            const icons = {
                upload: 'fa-upload',
                note: 'fa-sticky-note',
                ai: 'fa-robot',
                read: 'fa-check-circle'
            };
            return icons[type] || 'fa-circle';
        }

        // 初始化事件监听器
        function initializeEventListeners() {
            // 用户菜单
            document.getElementById('userMenuBtn').addEventListener('click', function() {
                document.getElementById('userMenu').classList.toggle('hidden');
            });

            // 上传按钮
            document.getElementById('uploadBtn').addEventListener('click', function() {
                document.getElementById('uploadModal').classList.remove('hidden');
            });

            // 关闭上传弹窗
            document.getElementById('closeUploadModal').addEventListener('click', function() {
                document.getElementById('uploadModal').classList.add('hidden');
            });

            // 文件上传区域
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');

            uploadArea.addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    selectedFile = e.target.files[0];
                    document.getElementById('startUpload').disabled = false;
                    uploadArea.innerHTML = `
                        <i class="fas fa-file-pdf text-4xl text-primary mb-4"></i>
                        <p class="text-gray-900 mb-2">${selectedFile.name}</p>
                        <p class="text-sm text-gray-500">${(selectedFile.size / 1024 / 1024).toFixed(2)} MB</p>
                    `;
                }
            });

            // 开始上传
            document.getElementById('startUpload').addEventListener('click', function() {
                if (selectedFile) {
                    simulateUpload();
                }
            });

            // 视图切换
            document.getElementById('gridViewBtn').addEventListener('click', function() {
                currentView = 'grid';
                this.classList.add('bg-primary', 'text-white');
                this.classList.remove('text-gray-600');
                document.getElementById('listViewBtn').classList.remove('bg-primary', 'text-white');
                document.getElementById('listViewBtn').classList.add('text-gray-600');
                
                document.getElementById('documentsGrid').classList.remove('hidden');
                document.getElementById('documentsList').classList.add('hidden');
                renderDocuments();
            });

            document.getElementById('listViewBtn').addEventListener('click', function() {
                currentView = 'list';
                this.classList.add('bg-primary', 'text-white');
                this.classList.remove('text-gray-600');
                document.getElementById('gridViewBtn').classList.remove('bg-primary', 'text-white');
                document.getElementById('gridViewBtn').classList.add('text-gray-600');
                
                document.getElementById('documentsGrid').classList.add('hidden');
                document.getElementById('documentsList').classList.remove('hidden');
                renderDocumentsList();
            });

            // 搜索功能
            document.getElementById('globalSearch').addEventListener('input', function(e) {
                const query = e.target.value.toLowerCase();
                const filtered = documents.filter(doc => 
                    doc.title.toLowerCase().includes(query) ||
                    doc.author.toLowerCase().includes(query) ||
                    doc.tags.some(tag => tag.toLowerCase().includes(query))
                );
                renderDocuments(filtered);
            });
        }

        // 模拟上传过程
        function simulateUpload() {
            const progressContainer = document.getElementById('uploadProgress');
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            
            progressContainer.classList.remove('hidden');
            document.getElementById('startUpload').disabled = true;
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        document.getElementById('uploadModal').classList.add('hidden');
                        // 重置上传状态
                        progressContainer.classList.add('hidden');
                        progressBar.style.width = '0%';
                        progressPercent.textContent = '0%';
                        document.getElementById('startUpload').disabled = false;
                        selectedFile = null;
                        
                        // 刷新文献列表
                        loadDocuments();
                    }, 1000);
                }
                
                progressBar.style.width = progress + '%';
                progressPercent.textContent = Math.round(progress) + '%';
            }, 200);
        }

        // 更新文献数量显示
        function updateDocumentCount() {
            document.getElementById('documentCount').textContent = `${documents.length} 篇文献`;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        // 选择类目
        function selectCategory(categoryId) {
            // 移除所有选中状态
            document.querySelectorAll('.category-item').forEach(item => {
                item.classList.remove('bg-primary', 'text-white');
            });
            
            // 添加选中状态
            const selectedItem = document.querySelector(`[data-category-id="${categoryId}"]`);
            if (selectedItem) {
                selectedItem.classList.add('bg-primary', 'text-white');
            }
            
            // 过滤文献
            let filteredDocs = documents;
            if (categoryId !== 'all') {
                filteredDocs = documents.filter(doc => doc.category_id === categoryId);
            }
            
            renderDocuments(filteredDocs);
            updateDocumentCount();
        }

        // 编辑类目
        function editCategory(categoryId) {
            // 这里可以实现编辑类目的功能
            console.log('编辑类目:', categoryId);
